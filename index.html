<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adem Store | متجر الفخامة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --accent: #d4af37; }
        body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at top right, #3d2b5e, #1a1226); min-height: 100vh; color: #f3f4f6; overflow-x: hidden; }
        .premium-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(to bottom, #f9e29d 0%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(45deg, #d4af37, #f9e29d); color: #1a1226; transition: 0.3s; cursor: pointer; }
        .btn-gold:hover { opacity: 0.9; transform: scale(1.02); }
        
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; display: inline-flex; align-items: center; gap: 4px; }
        .status-ready { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-error { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; padding: 20px; direction: rtl; } }
    </style>
</head>
<body class="select-none">

    <nav class="sticky top-0 z-50 px-6 py-4">
        <div class="container mx-auto premium-glass rounded-full px-8 py-3 flex justify-between items-center">
            <div id="admin-trigger" class="cursor-pointer">
                <h1 class="text-xl font-black gold-text tracking-[0.2em] uppercase">Luxury</h1>
            </div>
            <div class="relative cursor-pointer flex items-center gap-2" onclick="toggleCart()">
                <div class="p-2 bg-white/5 rounded-full relative">
                    <i class="fa-solid fa-cart-shopping text-sm text-gray-300"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-[#d4af37] text-[#1a1226] text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10"></div>
    </main>

    <div id="admin-panel" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4 bg-[#0d0915]/98 backdrop-blur-3xl">
        <div class="premium-glass w-full max-w-7xl rounded-[2.5rem] p-8 border-white/10 max-h-[95vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold gold-text italic">لوحة التحكم الاحترافية</h2>
                <div id="order-stats" class="text-[11px] text-gray-400">جاري تحميل البيانات...</div>
            </div>
            
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-6 overflow-hidden">
                <div class="bg-white/5 p-5 rounded-3xl border border-white/5 h-fit">
                    <h3 class="text-xs font-bold mb-4 opacity-60">إضافة منتج جديد</h3>
                    <input type="text" id="p-name" placeholder="اسم المنتج" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-xs text-white mb-2">
                    <input type="number" id="p-price" placeholder="السعر" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-xs text-white mb-2">
                    <input type="file" id="p-file" accept="image/*" class="w-full bg-white/5 border border-white/10 p-2 rounded-xl text-[10px] text-white mb-4">
                    <button onclick="addProduct()" class="w-full btn-gold py-3 rounded-xl font-bold text-xs uppercase">نشر في المتجر</button>
                    <div id="admin-delete-list" class="mt-6 space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                </div>

                <div class="xl:col-span-3 bg-white/5 p-6 rounded-3xl border border-white/5 flex flex-col overflow-hidden text-right">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-[#d4af37]">إدارة طلبات التوصيل</span>
                        <button onclick="clearAllOrders()" class="text-[10px] text-red-400 opacity-50 hover:opacity-100">حذف جميع السجلات</button>
                    </div>
                    
                    <div class="overflow-auto flex-1 custom-scrollbar">
                        <table class="w-full text-right text-[11px]">
                            <thead class="sticky top-0 bg-[#1a1226] z-10">
                                <tr class="text-gray-500 border-b border-white/10">
                                    <th class="pb-3 px-2">العميل</th>
                                    <th class="pb-3 px-2">المنتجات</th>
                                    <th class="pb-3 px-2">شركة الشحن</th>
                                    <th class="pb-3 px-2">الحالة</th>
                                    <th class="pb-3 px-2 text-center">إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body"></tbody>
                        </table>
                    </div>
                    <button onclick="closeAdmin()" class="mt-4 text-gray-500 text-[10px] uppercase">إغلاق اللوحة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="print-area" class="hidden"></div>

    <div id="cart-sidebar" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="toggleCart()"></div>
        <div class="absolute left-0 top-0 h-full w-full max-w-sm bg-[#1a1226] p-8 text-white">
            <h2 class="text-2xl font-bold mb-8 gold-text">سلة التسوق</h2>
            <div id="cart-items" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
            <div id="cart-footer" class="hidden border-t border-white/10 mt-6 pt-6">
                <div class="flex justify-between mb-6"><span>الإجمالي:</span><span id="total-price" class="text-xl font-bold text-[#d4af37]"></span></div>
                <button onclick="showOrderForm()" class="w-full btn-gold py-4 rounded-full font-black">إتمام الطلب</button>
            </div>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl">
        <div class="premium-glass w-full max-w-md rounded-[2.5rem] p-10">
            <h2 class="text-2xl font-bold mb-8 text-center gold-text">معلومات الشحن</h2>
            <form id="purchase-form" class="space-y-5 text-right">
                <input type="text" id="cust-name" placeholder="الاسم الكامل" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-[#d4af37]">
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-[#d4af37]">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="cust-state" placeholder="الولاية" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none">
                    <input type="text" id="cust-city" placeholder="البلدية" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none">
                </div>
                <button type="submit" class="w-full btn-gold py-5 rounded-2xl font-black">تأكيد الطلب</button>
                <button type="button" onclick="closeOrderForm()" class="w-full text-gray-500 text-xs">رجوع</button>
            </form>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        var firebaseConfig = {
          apiKey: "AIzaSyARDJu3-UEDwN4aDf2S5g3DNybZBeZJ2x0",
          authDomain: "dimo-shop-59a4c.firebaseapp.com",
          databaseURL: "https://dimo-shop-59a4c-default-rtdb.firebaseio.com",
          projectId: "dimo-shop-59a4c",
          storageBucket: "dimo-shop-59a4c.firebasestorage.app",
          messagingSenderId: "703670238398",
          appId: "1:703670238398:web:f132a544715ff9aa7032ef"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var productsRef = db.ref('products');

        const BOT_TOKEN = "8784614376:AAHochI758ttu6Fg9P2byf-7ZyjDhn_Pi0Q"; //
        const CHAT_ID = "6335106371"; //

        let products = [];
        let orders = JSON.parse(localStorage.getItem('luxuryOrdersDB')) || [];
        let cart = [];

        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            products = data ? Object.keys(data).map(key => ({...data[key], firebaseKey: key})) : [];
            render();
            renderAdminList();
        });

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-file').files[0];
            if (name && price && file) {
                const reader = new FileReader();
                reader.onload = (e) => productsRef.push({ id: Date.now(), name, price: parseInt(price), img: e.target.result });
                reader.readAsDataURL(file);
            }
        }

        function render() {
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="premium-glass rounded-[2rem] overflow-hidden border border-white/5 transition-all hover:border-[#d4af37]/50">
                    <img src="${p.img}" class="h-64 w-full object-cover">
                    <div class="p-6 text-right">
                        <h3 class="font-bold text-sm mb-3">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-[#d4af37] font-black">${p.price} د.ج</span>
                            <button onclick="addToCart(${p.id})" class="p-3 bg-white/5 rounded-full hover:bg-[#d4af37]"><i class="fa-solid fa-plus text-xs"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdminList() {
            document.getElementById('admin-delete-list').innerHTML = products.map(p => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl mb-1 border border-white/5">
                    <button onclick="db.ref('products/'+'${p.firebaseKey}').remove()" class="text-red-500 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    <span class="text-[9px] truncate w-24 text-right">${p.name}</span>
                </div>
            `).join('');
        }

        function addToCart(id) { 
            const item = products.find(x => x.id === id);
            if(item) { cart.push(item); updateUI(); }
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length > 0) {
                document.getElementById('cart-footer').classList.remove('hidden');
                let total = cart.reduce((s, i) => s + i.price, 0);
                document.getElementById('cart-items').innerHTML = cart.map(item => `<div class="flex justify-between text-[10px] bg-white/5 p-3 rounded-xl border border-white/5"><span>${item.price} د.ج</span><span>${item.name}</span></div>`).join('');
                document.getElementById('total-price').innerText = total + " د.ج";
            }
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }
        function showOrderForm() { document.getElementById('cart-sidebar').classList.add('hidden'); document.getElementById('order-modal').classList.remove('hidden'); }
        function closeOrderForm() { document.getElementById('order-modal').classList.add('hidden'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }

        document.getElementById('purchase-form').onsubmit = async function(e) {
            e.preventDefault();
            const n = document.getElementById('cust-name').value;
            const ph = document.getElementById('cust-phone').value;
            const st = document.getElementById('cust-state').value;
            const ct = document.getElementById('cust-city').value;
            const tot = document.getElementById('total-price').innerText;
            const its = cart.map(i => i.name).join(', ');

            // التعديل الجوهري: حفظ الطلب فوراً قبل الإرسال
            const newOrder = { id: Date.now(), name: n, phone: ph, state: st, city: ct, items: its, total: tot, courier: "ZR Express" };
            orders.unshift(newOrder); // وضع الطلب في بداية القائمة
            localStorage.setItem('luxuryOrdersDB', JSON.stringify(orders));

            const msg = `📦 طلب جديد\nالاسم: ${n}\nالهاتف: ${ph}\nالولاية: ${st}\nالبلدية: ${ct}\nالمنتجات: ${its}\nالإجمالي: ${tot}`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
                });
                alert("✅ تم إرسال الطلب وحفظه في الإدارة!");
                cart = []; updateUI(); closeOrderForm();
                if(!document.getElementById('admin-panel').classList.contains('hidden')) renderOrders();
            } catch (err) { alert("⚠️ فشل الإرسال، لكن تم حفظ الطلب محلياً."); }
        };

        let pressTimer;
        document.getElementById('admin-trigger').addEventListener('mousedown', () => {
            pressTimer = setTimeout(() => {
                if (prompt("كلمة السر:") === "ademnawalformamatnhbek") {
                    renderOrders();
                    document.getElementById('admin-panel').classList.remove('hidden');
                }
            }, 2000);
        });

        function renderOrders() {
            const tableBody = document.getElementById('orders-table-body');
            document.getElementById('order-stats').innerText = `إجمالي الطلبات: ${orders.length}`;
            
            if (orders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 opacity-30">لا توجد طلبات مسجلة</td></tr>';
                return;
            }

            tableBody.innerHTML = orders.map(o => {
                const isValid = o.phone && o.phone.length >= 10;
                return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="py-4 px-2">
                        <div class="font-bold text-white">${o.name}</div>
                        <div class="opacity-40 text-[9px]">${o.phone}</div>
                    </td>
                    <td class="py-4 px-2">
                        <div class="truncate max-w-[120px]">${o.items}</div>
                        <div class="text-[#d4af37] font-bold">${o.total}</div>
                    </td>
                    <td class="py-4 px-2">
                        <span class="bg-white text-[#1a1226] px-2 py-1 rounded text-[9px] font-bold">${o.courier}</span>
                    </td>
                    <td class="py-4 px-2">
                        <span class="status-badge ${isValid ? 'status-ready' : 'status-error'}">
                            <i class="fa-solid ${isValid ? 'fa-check' : 'fa-warning'}"></i> ${isValid ? 'جاهز' : 'رقم خاطئ'}
                        </span>
                    </td>
                    <td class="py-4 px-2 text-center flex justify-center gap-2">
                        <button onclick="printOrder(${o.id})" class="text-blue-400 bg-blue-400/10 p-2 rounded-lg hover:bg-blue-400/20"><i class="fa-solid fa-print"></i></button>
                        <button onclick="deleteOrder(${o.id})" class="text-red-400 bg-red-400/10 p-2 rounded-lg hover:bg-red-400/20"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function printOrder(id) {
            const o = orders.find(x => x.id === id);
            const pArea = document.getElementById('print-area');
            pArea.innerHTML = `<div style="border:2px solid #000; padding:20px; direction:rtl; color:black; background:white;">
                <h2 style="text-align:center;">وصل طلب - Adem Store</h2><hr>
                <p><b>العميل:</b> ${o.name} (${o.phone})</p>
                <p><b>العنوان:</b> ${o.state} - ${o.city}</p>
                <p><b>المنتجات:</b> ${o.items}</p><hr>
                <h3>الإجمالي: ${o.total}</h3>
            </div>`;
            window.print();
        }

        function deleteOrder(id) { if(confirm("حذف الطلب؟")) { orders = orders.filter(x => x.id !== id); localStorage.setItem('luxuryOrdersDB', JSON.stringify(orders)); renderOrders(); } }
        function clearAllOrders() { if(confirm("سيتم حذف كل السجلات، هل أنت متأكد؟")) { orders = []; localStorage.removeItem('luxuryOrdersDB'); renderOrders(); } }
    </script>
</body>
</html>
